name: Build All Platforms

on:
  push:
    tags:
      - 'v*'           # Trigger on version tags: v1.0.0, v1.2.3
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: write      # Needed to create GitHub releases

jobs:

  # ═══════════════════════════════════════════════════════════════
  #  WINDOWS — Produces SwiftReply_x.x.x_x64-setup.exe + .msi
  # ═══════════════════════════════════════════════════════════════
  build-windows:
    name: Windows (.exe + .msi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './frontend/src-tauri -> target'

      - name: Bundle Python backend (PyInstaller)
        working-directory: backend
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
          pyinstaller swiftreply.spec --distpath ../backend-bundled --clean -y

      - name: Copy backend to Tauri resources
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "frontend/src-tauri/resources/backend"
          Copy-Item -Recurse -Force "backend-bundled/swiftreply-backend/*" "frontend/src-tauri/resources/backend/"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri Windows app
        working-directory: frontend
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npm run tauri:build:windows

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  #  macOS — Produces SwiftReply_x.x.x_universal.dmg
  #           Universal binary: Intel x86_64 + Apple Silicon arm64
  # ═══════════════════════════════════════════════════════════════
  build-macos:
    name: macOS (.dmg universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './frontend/src-tauri -> target'

      - name: Bundle Python backend (PyInstaller universal)
        working-directory: backend
        run: |
          pip3 install pyinstaller
          pip3 install -r requirements.txt
          pyinstaller swiftreply.spec --distpath ../backend-bundled --clean -y

      - name: Copy backend to Tauri resources
        run: |
          mkdir -p frontend/src-tauri/resources/backend
          cp -r backend-bundled/swiftreply-backend/ frontend/src-tauri/resources/backend/
          chmod +x frontend/src-tauri/resources/backend/swiftreply-backend

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri macOS universal app
        working-directory: frontend
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npm run tauri:build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            frontend/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  #  ANDROID — Produces SwiftReply-debug.apk + release.aab
  # ═══════════════════════════════════════════════════════════════
  build-android:
    name: Android (.apk + .aab)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React web app
        working-directory: frontend
        run: npm run build

      - name: Add Android platform
        working-directory: frontend
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor to Android
        working-directory: frontend
        run: npx cap sync android

      - name: Build debug APK
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build release AAB
        working-directory: frontend/android
        env:
          KEYSTORE_PATH: ${{ secrets.ANDROID_KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Sign APK (release)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks release.keystore \
            --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            frontend/android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            frontend/android/app/build/outputs/apk/debug/*.apk
            frontend/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  #  RELEASE — Attach all builds to GitHub Release
  # ═══════════════════════════════════════════════════════════════
  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List artifacts
        run: find dist/ -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: SwiftReply ${{ github.ref_name }}
          body: |
            ## SwiftReply ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Install |
            |---|---|---|
            | 🪟 Windows | `*-setup.exe` | Double-click to install |
            | 🍎 macOS | `*.dmg` | Open and drag to Applications |
            | 🤖 Android | `*-debug.apk` | Enable Unknown Sources, install directly |
            | 🤖 Android (Play Store) | `*.aab` | Upload to Google Play Console |

            ### First Run Setup
            1. Install and open SwiftReply
            2. Register your organisation
            3. Go to Settings → add your Evolution API URL + key
            4. Go to Live Dashboard → Pair → scan QR code with WhatsApp
            5. Done — AI replies to all incoming messages automatically
          files: |
            dist/**/*.exe
            dist/**/*.msi
            dist/**/*.dmg
            dist/**/*.apk
            dist/**/*.aab
          draft: false
          prerelease: false
